<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>希望之州 | 诸神愚戏</title>
  <link rel="stylesheet" href="styles.css?v=20260718-god-themes-2">
</head>
<body>
  <div class="ambient" aria-hidden="true">
    <div class="ambient__line ambient__line--left"></div>
    <div class="ambient__line ambient__line--right"></div>
  </div>

  <header class="topbar">
    <a class="brand" href="#leaderboard" data-view-link="leaderboard" aria-label="希望之洲排行榜">
      <img src="assets/hope-state-sigil.svg" alt="" class="brand__sigil">
      <span>
        <strong>希望之洲</strong>
        <small>诸神愚戏・洲民神谕档案室</small>
      </span>
    </a>
    <nav class="nav" aria-label="主导航">
      <button class="nav__item is-active" type="button" data-view-link="leaderboard">
        <span>诸神圣榜</span><small>全洲信徒试炼位次</small>
      </button>
      <button class="nav__item" type="button" data-view-link="private">
        <span>信徒档案</span><small>本人私藏卷宗</small>
      </button>
      <button class="nav__item" type="button" data-view-link="admin">
        <span>神谕登记</span><small>信徒信息录入</small>
      </button>
    </nav>
  </header>

  <main class="shell">
    <section class="hero-panel">
      <span class="hero-panel__seal hero-panel__seal--tl" aria-hidden="true"></span>
      <span class="hero-panel__seal hero-panel__seal--tr" aria-hidden="true"></span>
      <span class="hero-panel__seal hero-panel__seal--bl" aria-hidden="true"></span>
      <span class="hero-panel__seal hero-panel__seal--br" aria-hidden="true"></span>
      <div>
        <p class="eyebrow">Divine Archive Registry</p>
        <h1>希望之洲・神民档案室</h1>
        <p class="hero-panel__edict">【封印谕令】圣榜公示仅展露表层职阶，完整权柄卷宗受私藏暗语枷锁禁锢，唯信徒本人可解锁阅览</p>
      </div>
      <div class="status-card">
        <span>试炼卷宗</span>
        <strong id="totalProfiles">0</strong>
        <small id="dataModeLabel"></small>
      </div>
    </section>

    <section class="view is-active" id="leaderboardView" aria-labelledby="leaderboardTitle">
      <div class="section-head">
        <div>
          <p class="eyebrow">Leaderboard</p>
          <h2 id="leaderboardTitle">排行榜</h2>
        </div>
        <div class="segmented" role="group" aria-label="排行榜模式">
          <button class="is-active" type="button" data-rank-mode="total">总榜</button>
          <button type="button" data-rank-mode="ascension">登神分</button>
          <button type="button" data-rank-mode="audience">觐见分</button>
        </div>
      </div>
      <div class="toolbar toolbar--between">
        <input class="search" id="leaderboardSearch" placeholder="搜索">
        <select class="search" id="pathFilter">
          <option value="all">全部命途</option>
          <option value="生命">生命</option>
          <option value="存在">存在</option>
          <option value="文明">文明</option>
          <option value="虚无">虚无</option>
          <option value="混沌">混沌</option>
          <option value="沉沦">沉沦</option>
        </select>
      </div>
      <div class="leaderboard" id="leaderboardList"></div>
    </section>

    <section class="view" id="privateView" aria-labelledby="privateTitle">
      <div class="private-layout">
        <form class="panel access-panel access-panel--sealed" id="secretForm">
          <span class="access-panel__seal access-panel__seal--tl" aria-hidden="true"></span>
          <span class="access-panel__seal access-panel__seal--tr" aria-hidden="true"></span>
          <span class="access-panel__seal access-panel__seal--bl" aria-hidden="true"></span>
          <span class="access-panel__seal access-panel__seal--br" aria-hidden="true"></span>
          <div class="access-panel__head">
            <div>
              <p class="eyebrow">Seal of Believer</p>
              <h2 id="privateTitle">私藏暗语封印匣</h2>
            </div>
            <button class="mini-btn" type="button" id="logoutButton" hidden>切断神谕链接</button>
          </div>
          <label class="secret-name-row">
            <span>信徒法号</span>
            <span class="secret-input">
              <input id="secretName" maxlength="24" required type="text" data-secret-field>
              <button class="mini-btn" type="button" data-toggle-secret="secretName">遮蔽法号</button>
            </span>
          </label>
          <label class="unlock-row">
            解锁封印暗契
            <span class="secret-input">
              <input id="secretPhrase" maxlength="80" required type="text" data-secret-field>
              <button class="mini-btn" type="button" data-toggle-secret="secretPhrase">遮蔽暗契</button>
            </span>
          </label>
          <button class="btn btn--primary btn--unlock" type="submit">启封天赋卷宗</button>
        </form>
        <div id="privatePanel" class="panel profile-preview profile-preview--wide dossier-card dossier-card--empty">
          <div class="dossier-head">
            <div class="avatar-orbit"><span class="avatar-core"><span>希</span></span></div>
            <div>
              <p class="eyebrow">Believer Dossier</p>
              <h3>未启封</h3>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section class="view" id="adminView" aria-labelledby="adminTitle">
      <div class="section-head">
        <div>
          <p class="eyebrow">Admin Desk</p>
          <h2 id="adminTitle">管理录入与打分</h2>
        </div>
        <button class="btn btn--ghost" type="button" id="refreshButton">刷新数据</button>
      </div>

      <div class="admin-grid">
        <form class="panel form-panel" id="adminProfileForm">
          <label class="span-2">
            管理密钥
            <input id="adminKey" type="password" autocomplete="off">
          </label>
          <div class="form-note span-2" id="professionLibraryStatus"></div>
          <label>
            州民昵称
            <input id="nameInput" maxlength="24" required>
          </label>
          <label>
            私密暗语
            <span class="secret-input">
              <input id="phraseInput" maxlength="80" type="text" data-secret-field>
              <button class="mini-btn" type="button" data-toggle-secret="phraseInput">隐匿暗语</button>
            </span>
          </label>
          <label>
            信仰神明
            <select id="godInput" required></select>
          </label>
          <label>
            命途
            <select id="pathInput" required>
              <option value="生命">生命</option>
              <option value="存在">存在</option>
              <option value="文明">文明</option>
              <option value="虚无">虚无</option>
              <option value="混沌">混沌</option>
              <option value="沉沦">沉沦</option>
            </select>
          </label>
          <label>
            职业 / 身份
            <input id="classInput" maxlength="24" list="professionOptions">
            <datalist id="professionOptions"></datalist>
          </label>
          <label>
            登神分
            <input id="ascensionInput" type="number" min="0" value="1000">
          </label>
          <label>
            觐见分
            <input id="audienceInput" type="number" min="0" value="0">
          </label>
          <label class="span-2">
            公开短记
            <textarea id="publicNoteInput" maxlength="160" rows="3"></textarea>
          </label>
          <label class="span-2">
            私密备注
            <textarea id="privateNoteInput" maxlength="240" rows="3"></textarea>
          </label>
          <label class="span-2">
            天赋列表
            <textarea id="talentsInput" rows="5"></textarea>
          </label>
          <div class="form-actions span-2">
            <button class="btn btn--primary" type="submit">保存/更新档案</button>
            <button class="btn btn--ghost" type="button" id="clearAdminFormButton">清空表单</button>
          </div>
        </form>

        <div class="side-stack">
          <form class="panel score-form" id="scoreForm">
            <label>
              结算对象
              <select id="scoreTarget" required></select>
            </label>
            <div class="score-inputs">
              <label>
                登神分变化
                <input id="ascensionDelta" type="number" min="-20" max="20" value="0">
              </label>
              <label>
                觐见分变化
                <input id="audienceDelta" type="number" min="-3" max="3" value="0">
              </label>
            </div>
            <label>
              结算理由
              <textarea id="scoreReason" rows="5" maxlength="160"></textarea>
            </label>
            <button class="btn btn--primary" type="submit">提交结算</button>
            <section class="bulk-score-box" aria-labelledby="bulkScoreTitle">
              <div>
                <p class="eyebrow">Bulk Score</p>
                <h3 id="bulkScoreTitle">批量分数结算</h3>
              </div>
              <textarea id="bulkScoreInput" rows="7"></textarea>
              <div class="form-actions">
                <button class="btn btn--primary" type="button" id="bulkScorePreviewButton">检查结算</button>
                <button class="btn btn--ghost" type="button" id="bulkScoreSubmitButton">提交有效结算</button>
              </div>
              <div class="import-results" id="bulkScoreResult"></div>
            </section>
            <div class="settlement-log" id="settlementLog"></div>
          </form>

          <section class="panel score-form" aria-labelledby="bulkImportTitle">
            <div>
              <p class="eyebrow">Bulk Import</p>
              <h3 id="bulkImportTitle">批量导入</h3>
            </div>
            <textarea id="bulkImportInput" rows="9"></textarea>
            <div class="form-actions">
              <button class="btn btn--primary" type="button" id="bulkPreviewButton">检查内容</button>
              <button class="btn btn--ghost" type="button" id="bulkImportButton">导入有效行</button>
            </div>
            <div class="import-results" id="bulkImportResult"></div>
          </section>
        </div>
      </div>
    </section>
  </main>

  <div class="modal" id="publicModal" hidden>
    <div class="modal__backdrop" data-close-public></div>
    <article class="modal__panel panel" id="publicPanel"></article>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <script src="app.js"></script>
</body>
</html>
